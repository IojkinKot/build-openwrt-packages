name: Build packages

on:
  workflow_dispatch:  # manual trigger

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.release }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: 25.12.4
            arch: aarch64_cortex-a53
            target: mediatek
            subtarget: filogic
            custom_packages: "sstp-client vsftpd"
            builtin_packages: "dnsmasq busybox"
            extra_config: |
              CONFIG_BUSYBOX_CUSTOM=y
              CONFIG_BUSYBOX_CONFIG_FEATURE_SYSLOG_INFO=y
              CONFIG_BUSYBOX_CONFIG_FEATURE_CROND_SPECIAL_TIMES=y
              #24.10.*
              #CONFIG_BUSYBOX_CONFIG_FEATURE_EDITING_SAVEHISTORY=y
              #CONFIG_BUSYBOX_CONFIG_FEATURE_EDITING_SAVE_ON_EXIT=y
              #25.12.*
              CONFIG_BUSYBOX_CONFIG_FEATURE_EDITING_HISTORY=8192
              CONFIG_PACKAGE_dnsmasq_full_ipset=y

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev unzip zstd python3

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        env:
          cache-name: "cache-sdk-${{ matrix.release }}-${{ matrix.target}}-${{ matrix.subtarget}}"
        with:
          path: openwrt-sdk/
          key: ${{ runner.os }}-sdk-${{ env.cache-name }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "target:${{ matrix.target}}, subtarget: ${{ matrix.subtarget}}"

          # Get the actual SDK filename from the directory listing
          SDK_FILE=$(curl -s "https://downloads.openwrt.org/releases/${{ matrix.release }}/targets/${{ matrix.target}}/${{ matrix.subtarget}}/" | grep -o "openwrt-sdk-${{ matrix.release }}-${{ matrix.target}}-${{ matrix.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "SDK file not found for ${{ matrix.release }} ${{ matrix.target}} ${{ matrix.subtarget}}"
            exit 1
          fi
          
          SDK_DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ matrix.release }}/targets/${{ matrix.target}}/${{ matrix.subtarget}}/${SDK_FILE}"
          echo "Downloading SDK: $SDK_DOWNLOAD_URL"
          
          wget "$SDK_DOWNLOAD_URL"
          
          # Extract based on file extension
          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          elif [[ "$SDK_FILE" == *.tar.xz ]]; then
            tar -xf "$SDK_FILE"
          else
            echo "Unknown archive format: $SDK_FILE"
            exit 1
          fi
          
          rm "$SDK_FILE"

          # Find SDK directory
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)

          mv "$SDK_DIR" openwrt-sdk

      - name: Configure custom feed
        run: |
          cd openwrt-sdk

          grep -qF "src-link custom" feeds.conf.default || echo "src-link custom ${{ github.workspace }}" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -p custom -f ${{ matrix.custom_packages }}
          if [ -n "${{ matrix.builtin_packages }}" ]; then
            ./scripts/feeds install ${{ matrix.builtin_packages }}
          fi

      - name: Build package
        env:
          EXTRA_CONFIG: ${{ matrix.extra_config }}
        run: |
          cd openwrt-sdk

          printf '%s\n' "$EXTRA_CONFIG" >> .config
          make defconfig
          for pkg in ${{ matrix.custom_packages }} ${{ matrix.builtin_packages }}; do
            make "package/${pkg}/compile" V=s
          done

      - name: Verify packages
        run: find openwrt-sdk/bin/packages/${{ matrix.arch }}/ -name '*.apk' | grep .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}-${{ matrix.release }}
          path: openwrt-sdk/bin/packages/${{ matrix.arch }}/**/*.apk
